<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>IoT Smart Home Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* สไตล์ปุ่ม */
        .btn { padding: 12px 30px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; color: white; transition: 0.3s; }
        .btn-on { background-color: #2ecc71; }
        .btn-off { background-color: #e74c3c; }
        .btn:hover { opacity: 0.8; }

        select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 10px; font-size: 14px; }
        canvas { max-height: 300px; }
        .status-text { font-size: 20px; font-weight: bold; color: #34495e; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏠 Smart Home Control Center</h1>

        <div class="card">
            <h2>อุณหภูมิปัจจุบัน: <span id="currentTemp" style="color: #e67e22;">--</span> °C</h2>
        </div>

        <div class="card">
            <h3>💡 ควบคุมไฟห้องรับแขก</h3>
            <p class="status-text">สถานะ: <span id="lightStatus">ปิดอยู่</span></p>
            <button id="btnLight" class="btn btn-on" onclick="toggleLight()">เปิดไฟ (Turn ON)</button>
        </div>

        <div class="card">
            <h3>📈 ประวัติอุณหภูมิ</h3>
            <select id="tempRange" onchange="updateTempChart()">
                <option value="1h">1 ชั่วโมงที่ผ่านมา</option>
                <option value="24h">24 ชั่วโมงที่ผ่านมา</option>
            </select>
            <canvas id="tempChart"></canvas>
        </div>

        <div class="card">
            <h3>📶 สถานะการเชื่อมต่อบอร์ด (Signal Strength)</h3>
            <select id="boardRange" onchange="updateBoardChart()">
                <option value="1h">1 ชั่วโมงที่ผ่านมา</option>
                <option value="24h">24 ชั่วโมงที่ผ่านมา</option>
            </select>
            <canvas id="boardChart"></canvas>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:5000";

        // --- 1. ดึงอุณหภูมิปัจจุบันแบบ Real-time (ทุก 2 วินาที) ---
        function fetchCurrentTemp() {
            fetch(`${API_BASE}/room_temp`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("currentTemp").innerText = data.temp;
                })
                .catch(err => console.error("ไม่สามารถดึงอุณหภูมิได้"));
        }
        setInterval(fetchCurrentTemp, 2000);

        // --- 2. ฟังก์ชันควบคุมไฟ ---
        let isLightOn = false;
        function toggleLight() {
            const action = isLightOn ? "off" : "on";
            // ส่ง POST request ไปที่ API
            fetch(`${API_BASE}/api/light/${action}`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    isLightOn = !isLightOn;
                    const btn = document.getElementById("btnLight");
                    const status = document.getElementById("lightStatus");
                    
                    if(isLightOn) {
                        btn.innerText = "ปิดไฟ (Turn OFF)";
                        btn.className = "btn btn-off";
                        status.innerText = "เปิดอยู่";
                        status.style.color = "#2ecc71";
                    } else {
                        btn.innerText = "เปิดไฟ (Turn ON)";
                        btn.className = "btn btn-on";
                        status.innerText = "ปิดอยู่";
                        status.style.color = "#e74c3c";
                    }
                })
                .catch(err => alert("ไม่สามารถติดต่อ Server เพื่อควบคุมไฟได้"));
        }

        // --- 3. ฟังก์ชันสร้างและอัปเดตกราฟ ---
        function initChart(canvasId, label, color) {
            return new Chart(document.getElementById(canvasId).getContext('2d'), {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: label,
                        data: [],
                        borderColor: color,
                        backgroundColor: color + '22', // ใส่ความโปร่งใส
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        const tempChart = initChart('tempChart', 'อุณหภูมิ (°C)', '#e67e22');
        const boardChart = initChart('boardChart', 'สัญญาณ (RSSI)', '#2980b9');

        function updateTempChart() {
            const range = document.getElementById('tempRange').value;
            fetch(`${API_BASE}/api/history/temp?range=${range}`)
                .then(res => res.json())
                .then(data => {
                    tempChart.data.labels = data.labels;
                    tempChart.data.datasets[0].data = data.values;
                    tempChart.update();
                });
        }

        function updateBoardChart() {
            const range = document.getElementById('boardRange').value;
            fetch(`${API_BASE}/api/history/board?range=${range}`)
                .then(res => res.json())
                .then(data => {
                    boardChart.data.labels = data.labels;
                    boardChart.data.datasets[0].data = data.values;
                    boardChart.update();
                });
        }

        // อัปเดตกราฟอัตโนมัติทุก 5 วินาที
        setInterval(() => {
            updateTempChart();
            updateBoardChart();
        }, 5000);

        // โหลดข้อมูลครั้งแรกทันทีที่เปิดหน้าเว็บ
        updateTempChart();
        updateBoardChart();
        fetchCurrentTemp();
    </script>
</body>
</html>
